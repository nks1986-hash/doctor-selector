<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doctor AI Assistant — Symptom Triage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="chat-app">
      <header class="chat-header">
        <h1>🩺 Doctor AI Assistant</h1>
        <p>Describe your symptoms and we'll suggest the right specialist.</p>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chat-form" class="composer" autocomplete="off">
        <label for="symptom-input" class="sr-only">Describe your symptoms</label>
        <input
          id="symptom-input"
          class="symptom-input"
          type="text"
          placeholder="Type your symptoms… e.g. I have chest pain and shortness of breath"
          required
          autofocus
        />
        <button id="send-btn" type="submit">Send</button>
      </form>

      <footer class="disclaimer">
        ⚠️ For informational use only. Not a substitute for professional
        medical advice. Call emergency services for urgent symptoms.
      </footer>
    </main>

    <script src="frontend.js"></script>
  </body>
</html>
