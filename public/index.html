<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doctor Selector — Symptom Triage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="chat-app">
      <header class="chat-header">
        <h1>🩺 Doctor Selector</h1>
        <p>Describe your symptoms and we'll suggest the right specialist.</p>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chat-form" class="composer" autocomplete="off">
        <label for="symptom-quick" class="sr-only">Quick symptoms</label>
        <select id="symptom-quick" class="quick-select">
          <option value="">Quick symptoms…</option>
          <option>Chest pain and shortness of breath</option>
          <option>Persistent skin rash and itching</option>
          <option>Severe headache and dizziness</option>
          <option>Stomach pain and nausea</option>
          <option>Joint pain and swelling</option>
          <option>Blurred vision and eye irritation</option>
          <option>Sore throat, cough and runny nose</option>
          <option>Anxiety and trouble sleeping</option>
          <option>High fever and body ache</option>
        </select>

        <input
          id="symptom-input"
          class="symptom-input"
          type="text"
          placeholder="e.g. I have chest pain and shortness of breath"
          required
        />
        <button id="send-btn" type="submit">Send</button>
      </form>

      <footer class="disclaimer">
        ⚠️ For informational use only. Not a substitute for professional
        medical advice. Call emergency services for urgent symptoms.
      </footer>
    </main>

    <script src="frontend.js"></script>
  </body>
</html>
